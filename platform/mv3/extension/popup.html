<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdNauseam</title>
<link rel="icon" type="image/png" href="img/icon_32.png">
<link rel="stylesheet" href="css/menu.css">
</head>

<body class="active">
<div class="container">
  <div id="main" class="page">

    <header>
      <div id="toggle-button">
        <img src="img/icon_128.png" alt="AdNauseam" id="adn-icon">
      </div>
      <div id="stats">
        <div class="stats-line">
          <span id="visited" class="visited">0</span>
          <span class="separator">/</span>
          <span id="found" class="found">0</span>
          <span class="label">ads clicked / found</span>
        </div>
        <div id="vault-btn">
          <button id="vault-button">Ad Vault</button>
        </div>
      </div>
    </header>

    <div id="ad-list">
      <div id="alert-noads" class="alert">
        <p>No ads found on this page</p>
      </div>
      <ul id="ad-list-items"></ul>
    </div>

    <footer>
      <!-- uBlock Origin Button -->
      <span id="btn-ublock" class="footer-btn" title="Open uBlock Origin panel">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g clip-path="url(#clip0)">
            <path d="M16.2175 4.02258C20.7133 7.02043 22.2119 7.02043 26.7207 7.02043C26.7207 15.1872 26.7207 18.9044 25.0397 21.5559C23.6354 23.771 21.0578 25.2424 16.327 27.9429L16.2175 28.0053C11.4223 25.268 8.81633 23.7804 7.40012 21.5405C5.71436 18.8743 5.71436 15.1423 5.71436 6.96783L5.94356 6.96786C10.2754 6.96874 11.7988 6.96905 16.2175 4.02258Z" stroke="#999" stroke-width="1.5"/>
            <path fill-rule="evenodd" clip-rule="evenodd" d="M16.2461 15.152C16.2713 13.9342 17.2663 12.9548 18.49 12.9548C19.7296 12.9548 20.7344 13.9596 20.7344 15.1992C20.7344 16.4387 19.7296 17.4436 18.49 17.4436C17.2688 17.4436 16.2754 16.4682 16.2463 15.254L16.2461 15.152ZM16.2412 12.2097C16.8672 11.7381 17.6459 11.4586 18.49 11.4586C20.5559 11.4586 22.2306 13.1333 22.2306 15.1992C22.2306 17.2651 20.5559 18.9398 18.49 18.9398C17.4591 18.9398 16.5255 18.5227 15.8489 17.8481C15.3949 18.6321 14.5437 19.0009 13.2476 19.0009C11.1832 19.0009 10.2476 18.0634 10.2476 16.0069V11.5159H11.7457V16.0069C11.7457 17.3187 11.9328 17.5058 13.2438 17.5058C14.5544 17.5058 14.7419 17.3187 14.7419 16.0069V11.5159H16.2401L16.2412 12.2097Z" fill="#999"/>
          </g>
          <defs><clipPath id="clip0"><rect width="24" height="24" fill="white" transform="translate(4 4)"/></clipPath></defs>
        </svg>
      </span>

      <!-- Three State Button -->
      <span id="state-btn-wrapper" class="footer-btn">
        <button id="btn-strict" class="state-btn" data-state="strict">Strict</button>
        <button id="btn-active" class="state-btn selected" data-state="active">Active</button>
        <button id="btn-disable" class="state-btn" data-state="disable">Off</button>
      </span>

      <!-- Settings gear -->
      <span id="btn-settings" class="footer-btn" title="Open Settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5Z" stroke="#999" stroke-width="1.5"/>

        </svg>
      </span>
    </footer>

  </div>
</div>

<script src="js/adn/menu.js"></script>
</body>
</html>
